<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f3f5f8;
    color: #1f2937;
}

.page {
    max-width: 520px;
    margin: 48px auto;
    padding: 0 20px 32px;
}

.title {
    margin: 0 0 8px;
    font-size: 30px;
    text-align: center;
    color: #0f172a;
}

.subtitle {
    text-align: center;
    color: #6b7280;
    margin-bottom: 20px;
}

.top-nav {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 20px;
    margin-bottom: 24px;
    padding: 12px 16px;
    background: #ffffff;
    border: 1px solid #d9e2ec;
    border-radius: 10px;
}

.top-nav a {
    text-decoration: none;
    color: #1d4ed8;
    font-weight: 600;
}

.top-nav a:hover {
    text-decoration: underline;
}

.card {
    background: #ffffff;
    border: 1px solid #d9e2ec;
    border-radius: 12px;
    padding: 24px;
    box-shadow: 0 4px 14px rgba(15, 23, 42, 0.08);
}

.field {
    display: grid;
    gap: 8px;
    margin-bottom: 14px;
}

.field label {
    font-weight: 700;
    color: #111827;
}

.field input {
    border: 1px solid #cbd5e1;
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 14px;
    background: #ffffff;
}

.btn {
    margin-top: 6px;
    border: 1px solid transparent;
    border-radius: 8px;
    padding: 10px 16px;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    background: #1d4ed8;
    color: #ffffff;
    width: 100%;
}

.btn:hover {
    filter: brightness(0.95);
}

.error {
    margin: 0 0 12px;
    padding: 10px;
    border-radius: 8px;
    background: #fee2e2;
    color: #991b1b;
    border: 1px solid #fecaca;
}

.success {
    margin: 0 0 12px;
    padding: 10px;
    border-radius: 8px;
    background: #dcfce7;
    color: #166534;
    border: 1px solid #bbf7d0;
}

.hint {
    margin-top: 14px;
    color: #6b7280;
    font-size: 13px;
    text-align: center;
}

.hint a {
    color: #1d4ed8;
    text-decoration: none;
}

.hint a:hover {
    text-decoration: underline;
}
</style>

<div class="page">

<h2 class="title">Create Account</h2>
<p class="subtitle">Set up your account for the phishing training platform</p>

<nav class="top-nav">
    <a href="/">Home</a>
    <a href="/login/admin">Admin Login</a>
    <a href="/login/employee">Employee Login</a>
</nav>

<div class="card">

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

{% if success %}
<p class="success">{{ success }}</p>
{% endif %}

<form method="post">

<div class="field">
<label for="email">Email</label>
<input type="email" id="email" name="email" required>
</div>

<div class="field">
<label for="password">Password</label>
<input type="password" id="password" name="password" minlength="6" required>
</div>

<div class="field">
<label for="confirm_password">Confirm Password</label>
<input type="password" id="confirm_password" name="confirm_password" minlength="6" required>
</div>

<button type="submit" class="btn" onclick="this.innerText='Creating account...'">
Create Account
</button>

</form>

<p class="hint">
Already have an account? <a href="/login/employee">Log in here</a>
</p>

</div>
</div>

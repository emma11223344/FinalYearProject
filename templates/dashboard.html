<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PhishProof | Dashboard</title>
<style>
:root {
  --bg: #f8fafc;
  --ink: #0f172a;
  --muted: #64748b;
  --brand-dark: #0f766e;
  --brand: #14b8a6;
  --card: #ffffff;
  --line: #e2e8f0;
}
body { margin: 0; font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--ink); }
.page { max-width: 900px; margin: 32px auto; padding: 0 20px 32px; }
.card { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 24px; box-shadow: 0 6px 18px rgba(15, 23, 42, 0.06); text-align: center; }
h2 { margin: 0 0 10px; font-weight: 700; }
p { color: #475569; margin: 0 0 16px; }
a { color: #0f766e; font-weight: 700; text-decoration: none; }
a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="page">
    <div class="card">
        <h2>PhishProof | Dashboard</h2>
        <p>This fallback dashboard template exists to prevent template loading errors.</p>
        <a href="/">Return Home</a>
    </div>
</div>
</body>
</html>

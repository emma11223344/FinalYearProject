<style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Sans:wght@400;600;700&display=swap');

    :root {

        --line: #d9e2ec;
        --card: #ffffff;
        --brand-dark: #0f766e;
    }

        box-sizing: border-box;
    }

    body {

        background:

            radial-gradient(circle at 90% 20%, #e8fff5 0%, transparent 32%),

    }

    .page {
        max-width: 900px;
        margin: 32px auto;
        padding: 0 20px 32px;
    }

    .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 24px;
        box-shadow: 0 6px 18px rgba(15, 23, 42, 0.06);
        text-align: center;
    }

    h2 {
        margin: 0 0 10px;
        font-family: "Space Grotesk", "Segoe UI", sans-serif;
    }

    p {
        color: #475569;
        margin: 0 0 16px;
    }

    a {
        color: #0f766e;
        font-weight: 700;
        text-decoration: none;
    }

    a:hover {
        text-decoration: underline;
    }

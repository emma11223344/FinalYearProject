<style>
    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f3f5f8;
        color: #1f2937;
    }

    .page {
        max-width: 1000px;
        margin: 32px auto;
        padding: 0 20px 32px;
    }

    .title {
        margin: 0 0 16px;
        font-size: 30px;
        text-align: center;
        color: #0f172a;
    }

    .top-nav {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 20px;
        margin-bottom: 24px;
        padding: 12px 16px;
        background: #ffffff;
        border: 1px solid #d9e2ec;
        border-radius: 10px;
    }

    .top-nav a {
        text-decoration: none;
        color: #1d4ed8;
        font-weight: 600;
    }

    .top-nav a:hover {
        text-decoration: underline;
    }

    .card {
        background: #ffffff;
        border: 1px solid #d9e2ec;
        border-radius: 12px;
        padding: 24px;
        box-shadow: 0 4px 14px rgba(15, 23, 42, 0.08);
    }

    table {
        width: 100%;
        border-collapse: collapse;
    }

    th,
    td {
        border: 1px solid #d9e2ec;
        padding: 10px 12px;
        text-align: left;
    }

    th {
        background: #eff6ff;
        color: #0f172a;
    }

    .empty {
        text-align: center;
        color: #6b7280;
    }
</style>

<div class="page">
    <h1 class="title">Phishing Awareness Dashboard</h1>

    <nav class="top-nav">
        <a href="/">Home</a>
        <a href="/admin">Admin</a>
        <a href="/employee">Employee</a>
        <a href="/results">Results</a>
        <a href="/logout">Logout</a>
    </nav>

    <div class="card">
        <table> <!--table to display the results of phishing simulations, showing the campaign, action taken by employees, and the outcome-->
            <tr>
                <th>ID</th>
                <th>Scenario</th>
                <th>Outcome</th>
            </tr>

            {% for report in reports %} <!--loop through the reports retrieved from the database and display each report's id, scenario, and outcome in a table row. If there are no reports, display a message indicating that there is no data yet-->
            <tr>
                <td>{{ report.id }}</td>
                <td>{{ report.scenario }}</td>
                <td>{{ report.outcome }}</td>
            </tr>
            {% else %} <!--if there are no reports, display a message indicating that there is no data yet-->
            <tr>
                <td colspan="3" class="empty">No data yet</td>
            </tr>
            {% endfor %}
        </table>
    </div>
</div>

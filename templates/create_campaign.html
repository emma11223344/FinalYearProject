<style>
    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f3f5f8;
        color: #1f2937;
    }

    .page {
        max-width: 900px;
        margin: 32px auto;
        padding: 0 20px 32px;
    }

    .title {
        margin: 0 0 16px;
        font-size: 30px;
        text-align: center;
        color: #0f172a;
    }

    .top-nav {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 20px;
        margin-bottom: 24px;
        padding: 12px 16px;
        background: #ffffff;
        border: 1px solid #d9e2ec;
        border-radius: 10px;
    }

    .top-nav a {
        text-decoration: none;
        color: #1d4ed8;
        font-weight: 600;
    }

    .top-nav a:hover {
        text-decoration: underline;
    }

    .card {
        background: #ffffff;
        border: 1px solid #d9e2ec;
        border-radius: 12px;
        padding: 24px;
        box-shadow: 0 4px 14px rgba(15, 23, 42, 0.08);
    }

    .field {
        display: grid;
        gap: 8px;
        max-width: 360px;
    }

    .field label {
        font-weight: 700;
        color: #111827;
    }

    .field select {
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        padding: 10px 12px;
        font-size: 14px;
        background: #ffffff;
    }

    .btn {
        margin-top: 16px;
        border: 1px solid transparent;
        border-radius: 8px;
        padding: 10px 16px;
        font-weight: 700;
        font-size: 14px;
        cursor: pointer;
        background: #1d4ed8;
        color: #ffffff;
    }

    .btn:hover {
        filter: brightness(0.95);
    }
</style>

<div class="page">
    <h2 class="title">Create Campaign</h2>

    <nav class="top-nav">
        <a href="/">Home</a>
        <a href="/admin">Admin</a>
        <a href="/results">Results</a>
        <a href="/employee">Employee</a>
        <a href="/awareness">Awareness</a>
    </nav>

    <div class="card">
        <form method="post"> <!--form to create a new phishing campaign, submits the selected scenario to the server-->
            <div class="field">
                <label for="scenario">Scenario:</label>
                <select name="scenario" id="scenario">
                    <option>Password Reset</option>
                    <option>Invoice Scam</option>
                    <option>Delivery Notice</option>
                </select>
            </div>
            <button type="submit" class="btn">Create Campaign</button>
        </form>
    </div>
</div>

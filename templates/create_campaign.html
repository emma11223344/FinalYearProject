<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PhishProof | Create Campaign</title>
<style>
:root {
  --bg: #f8fafc;
  --ink: #0f172a;
  --muted: #64748b;
  --brand-dark: #0f766e;
  --brand: #14b8a6;
  --card: #ffffff;
  --line: #e2e8f0;
}
body { margin: 0; font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--ink); }
.page { max-width: 900px; margin: 32px auto; padding: 0 20px 32px; }
.title { margin: 0 0 16px; font-size: 30px; text-align: center; color: #0f172a; font-weight: 700; }
.card { background: #ffffff; border: 1px solid #d9e2ec; border-radius: 12px; padding: 24px; box-shadow: 0 4px 14px rgba(15, 23, 42, 0.08); }
.field { display: grid; gap: 8px; max-width: 360px; }
.field label { font-weight: 700; color: #111827; }
.field select { border: 1px solid #cbd5e1; border-radius: 8px; padding: 10px 12px; font-size: 14px; background: #ffffff; transition: border-color 200ms; }
.field select:focus { outline: none; border-color: var(--brand); }
.btn { margin-top: 16px; border: 1px solid transparent; border-radius: 8px; padding: 10px 16px; font-weight: 700; font-size: 14px; cursor: pointer; background: #1d4ed8; color: #ffffff; transition: filter 180ms; }
.btn:hover { filter: brightness(0.95); }
</style>
</head>

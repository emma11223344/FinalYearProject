<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PhishProof | Create Campaign</title>
<style>
:root {
  --bg: #f8fafc;
  --ink: #0f172a;
  --muted: #64748b;
  --brand-dark: #0f766e;
  --brand: #14b8a6;
  --card: #ffffff;
  --line: #e2e8f0;
}
body { margin: 0; font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--ink); }
.page { max-width: 900px; margin: 32px auto; padding: 0 20px 32px; }
.title { margin: 0 0 16px; font-size: 30px; text-align: center; color: #0f172a; font-weight: 700; }
.card { background: #ffffff; border: 1px solid #d9e2ec; border-radius: 12px; padding: 24px; box-shadow: 0 4px 14px rgba(15, 23, 42, 0.08); }
.field { display: grid; gap: 8px; max-width: 360px; margin-bottom: 16px; }
.field label { font-weight: 700; color: #111827; }
.field select, .field input[type="text"], .field textarea { border: 1px solid #cbd5e1; border-radius: 8px; padding: 10px 12px; font-size: 14px; background: #ffffff; transition: border-color 200ms; }
.field select:focus, .field input[type="text"]:focus, .field textarea:focus { outline: none; border-color: var(--brand); }
.btn { margin-top: 6px; border: 1px solid transparent; border-radius: 8px; padding: 6px 6px; font-weight: 700; font-size: 14px; cursor: pointer; background: #0f766e; color: #ffffff; transition: filter 180ms; }
.btn:hover { filter: brightness(0.95); }
.top-nav { display: flex; flex-wrap: wrap; gap: 10px; margin: 0 0 16px; }
.top-nav a { text-decoration: none; color: #0f172a; font-weight: 600; padding: 8px 12px; border: 1px solid var(--line); border-radius: 8px; background: #ffffff; }
.top-nav a:hover { background: #f1f5f9; }
</style>
</head>

<body> <!-- Create Phishing Simulation Campaign -->
  <div class="page">
    <nav class="top-nav"> 
      <a href="/">Home</a>
       <a href="/admin">Admin</a>
      <a href="/results">View Results</a>
      <a href="/awareness">Awareness</a>
      <a href="/logout">Logout</a>
    </nav>

    <h1 class="title">Create CustomPhishing Simulation Campaign</h1>
    <div class="card">
      <form method="POST" action="/create">
        <div class="field"> <!--input field for custom campaign name-->
          <label for="custom_name">Campaign Name</label>
          <input type="text" id="custom_name" name="custom_scenario" placeholder="Enter custom campaign name..." maxlength="100">

          <label for="custom_campaign_content">Campaign Content</label>
          <textarea id="custom_campaign_content" name="custom_campaign_content" placeholder="Write the campaign content here..." rows="5" maxlength="2000"></textarea>
        </div>

        <button type="submit" class="btn">Create Campaign</button>
      </form>
    </div>
  </div>
</body>
</html>

<style>
    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f3f5f8;
        color: #1f2937;
    }

    .page {
        max-width: 900px;
        margin: 32px auto;
        padding: 0 20px 32px;
    }

    .title {
        margin: 0 0 16px;
        font-size: 30px;
        text-align: center;
        color: #0f172a;
    }

    .top-nav {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 20px;
        margin-bottom: 24px;
        padding: 12px 16px;
        background: #ffffff;
        border: 1px solid #d9e2ec;
        border-radius: 10px;
    }

    .top-nav a {
        text-decoration: none;
        color: #1d4ed8;
        font-weight: 600;
    }

    .top-nav a:hover {
        text-decoration: underline;
    }

    .card {
        background: #ffffff;
        border: 1px solid #d9e2ec;
        border-radius: 12px;
        padding: 24px;
        box-shadow: 0 4px 14px rgba(15, 23, 42, 0.08);
    }

    .actions {
        display: flex;
        gap: 12px;
        margin-top: 18px;
        flex-wrap: wrap;
    }

    .btn {
        display: inline-block;
        border: 1px solid transparent;
        border-radius: 8px;
        padding: 10px 16px;
        font-weight: 700;
        font-size: 14px;
        text-decoration: none;
        cursor: pointer;
    }

    .btn-primary {
        background: #1d4ed8;
        color: #ffffff;
    }

    .btn-secondary {
        background: #ffffff;
        color: #374151;
        border-color: #cbd5e1;
    }

    .btn:hover {
        filter: brightness(0.95);
    }
</style>

<div class="page">
    <h1 class="title">Welcome to the Phishing Awareness Training Platform</h1>

    <nav class="top-nav">
        <a href="/">Home</a>
        <a href="/login/admin">Admin Login</a>
        <a href="/login/employee">Employee Login</a>
        <a href="/create-account">Create Account</a>
        <a href="/awareness">Awareness</a>
        <a href="/logout">Logout</a>
    </nav>

    <div class="card">
        <p>Select your role:</p> <!--buttons to navigate to different sections of the platform based on user role-->
        <div class="actions">
            <a href="/login/admin" class="btn btn-primary">Admin Login</a>
            <a href="/login/employee" class="btn btn-secondary">Employee Login</a>
            <a href="/create-account" class="btn btn-secondary">Create Account</a>
        </div>
    </div>
</div>

<style>
    /* Theme update: this dashboard now uses the same palette/typography as awareness for a single visual system. */
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Sans:wght@400;600;700&display=swap');

    :root {
        --bg: #f6fbff;
        --ink: #0f172a;
        --brand-dark: #0f766e;
        --card: #ffffff;
        --line: #d9e2ec;
    }

    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        color: var(--ink);
        background:
            radial-gradient(circle at 10% 10%, #dff8ff 0%, transparent 35%),
            radial-gradient(circle at 90% 20%, #e8fff5 0%, transparent 32%),
            linear-gradient(180deg, #eff8ff 0%, var(--bg) 38%, #ffffff 100%);
    }

    .page {
        max-width: 900px;
        margin: 32px auto;
        padding: 0 20px 32px;
    }

    .title {
        margin: 0 0 16px;
        font-size: 34px;
        font-family: "Space Grotesk", "Segoe UI", sans-serif;
        text-align: center;
        color: var(--ink);
    }

    .top-nav {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 20px;
        margin-bottom: 24px;
        padding: 12px 16px;
        background: rgba(255, 255, 255, 0.86);
        border: 1px solid var(--line);
        border-radius: 12px;
        backdrop-filter: blur(5px);
    }

    .top-nav a {
        text-decoration: none;
        color: var(--brand-dark);
        font-weight: 700;
    }

    .top-nav a:hover {
        text-decoration: underline;
    }

    .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 24px;
        box-shadow: 0 6px 18px rgba(15, 23, 42, 0.06);
    }

    .section-title {
        margin-top: 0;
        color: #0f172a;
    }

    .list {
        margin: 0;
        padding-left: 20px;
        line-height: 1.9;
    }

    .btn {
        border: 1px solid transparent;
        border-radius: 8px;
        padding: 8px 12px;
        font-weight: 700;
        font-size: 13px;
        cursor: pointer;
        background: var(--brand-dark);
        color: #ffffff;
        margin-left: 10px;
    }

    .btn:hover {
        filter: brightness(0.95);
    }

    .btn-completed {
        /* New state style: indicates simulations that are already completed and cannot be reopened. */
        background: #64748b;
        color: #ffffff;
        cursor: not-allowed;
    }

    .status {
        margin-left: 10px;
        font-size: 13px;
        font-weight: 700;
        color: #15803d;
    }

    .message {
        background: #fff7ed;
        border: 1px solid #fed7aa;
        color: #9a3412;
        border-radius: 10px;
        padding: 10px 12px;
        margin-bottom: 14px;
    }
</style>

<div class="page">
    <h2 class="title">Employee Dashboard</h2>

    <nav class="top-nav">
        <a href="/">Home</a>
        <a href="/employee">Dashboard</a>
        <a href="/awareness">Awareness</a>
    </nav>

    <div class="card">
        <h3 class="section-title">Available Campaigns:</h3> <!--display the list of available phishing campaigns for employees to simulate, retrieved from the database-->
        <!-- New message shown when backend blocks duplicate completion attempts. -->
        {% if message == "already-completed" %}
        <p class="message">You already completed this simulation.</p>
        {% endif %}
        <ul class="list">
        {% for c in campaigns %}
            <li>
                {{ c.scenario }}
                {% if c.id in completed_campaign_ids %}
                <!-- New completion lock state: campaign remains visible but disabled after submission. -->
                <button class="btn btn-completed" disabled>Completed</button>
                <span class="status">Done</span>
                {% else %}
                <a href="/simulate/{{ c.id }}"><button class="btn">View Simulation</button></a> <!--button to view the simulation for each campaign, linking to the simulate route with the campaign ID-->
                {% endif %}
            </li>
        {% endfor %}
        </ul>
    </div>
</div>

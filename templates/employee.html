<style>
    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f3f5f8;
        color: #1f2937;
    }

    .page {
        max-width: 900px;
        margin: 32px auto;
        padding: 0 20px 32px;
    }

    .title {
        margin: 0 0 16px;
        font-size: 30px;
        text-align: center;
        color: #0f172a;
    }

    .top-nav {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 20px;
        margin-bottom: 24px;
        padding: 12px 16px;
        background: #ffffff;
        border: 1px solid #d9e2ec;
        border-radius: 10px;
    }

    .top-nav a {
        text-decoration: none;
        color: #1d4ed8;
        font-weight: 600;
    }

    .top-nav a:hover {
        text-decoration: underline;
    }

    .card {
        background: #ffffff;
        border: 1px solid #d9e2ec;
        border-radius: 12px;
        padding: 24px;
        box-shadow: 0 4px 14px rgba(15, 23, 42, 0.08);
    }

    .section-title {
        margin-top: 0;
        color: #0f172a;
    }

    .list {
        margin: 0;
        padding-left: 20px;
        line-height: 1.9;
    }

    .btn {
        border: 1px solid transparent;
        border-radius: 8px;
        padding: 8px 12px;
        font-weight: 700;
        font-size: 13px;
        cursor: pointer;
        background: #1d4ed8;
        color: #ffffff;
        margin-left: 10px;
    }

    .btn:hover {
        filter: brightness(0.95);
    }
</style>

<div class="page">
    <h2 class="title">Employee Dashboard</h2>

    <nav class="top-nav">
        <a href="/">Home</a>
        <a href="/employee">Dashboard</a>
        <a href="/awareness">Awareness</a>
    </nav>

    <div class="card">
        <h3 class="section-title">Available Campaigns:</h3> <!--display the list of available phishing campaigns for employees to simulate, retrieved from the database-->
        <ul class="list">
        {% for c in campaigns %}
            <li>
                {{ c.scenario }}
                <a href="/simulate/{{ c.id }}"><button class="btn">View Simulation</button></a> <!--button to view the simulation for each campaign, linking to the simulate route with the campaign ID-->
            </li>
        {% endfor %}
        </ul>
    </div>
</div>
